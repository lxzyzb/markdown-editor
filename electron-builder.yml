appId: com.fileedit.app
productName: FileEdit
copyright: Copyright © 2026 fileEdit

directories:
  output: release/${version}
  buildResources: resources

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - "!**/*.map"

asar: true
asarUnpack:
  - resources/**

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: FileEdit

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-${arch}.${ext}

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
  artifactName: ${productName}-${version}-${arch}.${ext}

publish:
  provider: github
  owner: your-org
  repo: fileEdit
